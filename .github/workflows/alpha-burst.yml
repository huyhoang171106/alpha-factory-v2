name: Alpha Burst

on:
  schedule:
    # Weekdays during liquid market windows (UTC): 13,15,17,19,21
    - cron: "0 13,15,17,19,21 * * 1-5"
  workflow_dispatch:
    inputs:
      burst_limit:
        description: "Burst simulation limit"
        required: false
        default: "60"
      pre_rank_score:
        description: "Pre-rank score threshold"
        required: false
        default: "50"
      sync_limit:
        description: "Submit-review sync limit"
        required: false
        default: "40"

permissions:
  contents: read

concurrency:
  group: alpha-burst-${{ github.ref }}
  cancel-in-progress: true

jobs:
  burst:
    if: ${{ secrets.WQ_EMAIL != '' && secrets.WQ_PASSWORD != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      WQ_EMAIL: ${{ secrets.WQ_EMAIL }}
      WQ_PASSWORD: ${{ secrets.WQ_PASSWORD }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      WQ_INTERACTIVE_AUTH: "0"
      WQ_MAX_CONCURRENT: "2"
      WQ_POLL_INTERVAL: "12"
      WQ_MAX_WAIT_TIME: "480"
      GHA_BURST_LIMIT: ${{ inputs.burst_limit || '60' }}
      GHA_PRE_RANK_SCORE: ${{ inputs.pre_rank_score || '50' }}
      GHA_SYNC_LIMIT: ${{ inputs.sync_limit || '40' }}
      ASYNC_RANKER_WORKERS: "1"
      ASYNC_SIMULATOR_WORKERS: "1"
      ASYNC_USE_RAG: "0"
      ASYNC_REVIEW_JITTER_RATIO: "0.25"
      PUBLIC_STATUS_REPO: ${{ secrets.PUBLIC_STATUS_REPO }}
      PUBLIC_STATUS_TOKEN: ${{ secrets.PUBLIC_STATUS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run burst + sync-submit
        run: python alpha_factory_cli.py auto --profile gha --skip-install

      - name: Export KPI snapshot
        run: python alpha_factory_cli.py kpi --minutes 60 > kpi_snapshot.json

      - name: Export public-safe report
        run: python alpha_factory_cli.py public-report --minutes 60 --out public_report.json

      - name: Upload KPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpha-kpi-snapshot
          path: kpi_snapshot.json
          retention-days: 7

      - name: Upload public report artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpha-public-report
          path: public_report.json
          retention-days: 7

      - name: Mirror sanitized report to public showcase repo
        if: ${{ env.PUBLIC_STATUS_REPO != '' && env.PUBLIC_STATUS_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "alpha-factory-bot"
          git config --global user.email "alpha-factory-bot@users.noreply.github.com"
          git clone "https://x-access-token:${PUBLIC_STATUS_TOKEN}@github.com/${PUBLIC_STATUS_REPO}.git" public-status
          cp public_report.json public-status/public_report.json
          cd public-status
          git add public_report.json
          if git diff --cached --quiet; then
            echo "No public report changes."
            exit 0
          fi
          git commit -m "chore: update public quant metrics snapshot"
          git push
