name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Repository hygiene guardrail
        shell: bash
        run: |
          set -euo pipefail
          forbidden='(^|/)\.env$|(^|/)credentials\.json$|(^|/)alpha_results\.db($|-)|(^|/)results/|\.log$|(^|/)\.venv/'
          if git ls-files | grep -E "$forbidden"; then
            echo "Forbidden tracked file detected."
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: CLI smoke (no-network commands)
        run: |
          python alpha_factory_cli.py --help
          python alpha_factory_cli.py kpi --minutes 5
          python alpha_factory_cli.py sync-submit --help
