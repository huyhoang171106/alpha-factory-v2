name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - ".github/PULL_REQUEST_TEMPLATE.md"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "**/*.md"
      - ".github/PULL_REQUEST_TEMPLATE.md"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Repository hygiene guardrail
        shell: bash
        run: |
          set -euo pipefail
          forbidden='(^|/)\.env$|(^|/)credentials\.json$|(^|/)alpha_results\.db($|-)|(^|/)results/|\.log$|(^|/)\.venv/'
          if git ls-files | grep -E "$forbidden"; then
            echo "Forbidden tracked file detected."
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: CLI smoke (no-network commands)
        run: |
          python alpha_factory_cli.py --help
          python alpha_factory_cli.py kpi --minutes 5
          python alpha_factory_cli.py sync-submit --help
          python alpha_factory_cli.py public-report --minutes 5 --out results/public_report_ci.json
          python - <<'PY'
          import json
          with open("results/public_report_ci.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          assert "pipeline" in data and "qd_archive" in data
          dump = json.dumps(data).lower()
          for blocked in ("expression", "wq_password", "wq_email", "openrouter_api_key"):
              assert blocked not in dump, f"forbidden key leaked: {blocked}"
          print("public report guardrail passed")
          PY
